name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native arm64 runner (not cross-compiled/emulated), so this
          # catches real architecture-specific bugs -- pointer-width
          # assumptions, endianness, unsafe libc calls -- before a
          # release tag ever reaches release-deb.yml's matrix.
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry/build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}

      # Debian 13's minimum supported toolchain per Cargo.toml
      # (rust-version = "1.75"); build-essential/pkg-config/libc6-dev
      # cover what tun-rs/snow/socket2 need to compile.
      - name: Install system build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libc6-dev

      - name: cargo build --release
        run: cargo build --release --locked

      # Unit tests only -- integration tests that need a real TUN device
      # / CAP_NET_ADMIN aren't runnable in a standard CI container, same
      # exclusion debian/rules applies for package builds.
      - name: cargo test --release --lib
        run: cargo test --release --locked --lib

      # Informational only for now: not gating CI red/green on lint
      # findings until there's been a full clippy pass over the newer
      # monitoring code (control.rs, ipc.rs, mlvpn-tui.rs).
      - name: cargo clippy
        run: cargo clippy --release --locked --all-targets -- -D warnings
        continue-on-error: true

      - name: cargo fmt --check
        run: cargo fmt --check
        continue-on-error: true
